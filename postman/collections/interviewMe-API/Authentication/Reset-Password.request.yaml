$kind: http-request
name: Reset Password
method: POST
url: '{{baseUrl}}/users/auth/reset-password'
order: 4000
auth:
  type: noauth
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "token": "your_reset_token_here",
      "new_password": "newSecurePassword123"
    }
description: Reset password using a valid reset token obtained from the Forgot Password endpoint.
