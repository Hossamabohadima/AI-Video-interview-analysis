$kind: http-request
name: Forgot Password
method: POST
url: '{{baseUrl}}/users/auth/forgot-password'
order: 3000
auth:
  type: noauth
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "test@example.com"
    }
description: Request a password reset link. Always returns a success message to prevent email enumeration attacks.
